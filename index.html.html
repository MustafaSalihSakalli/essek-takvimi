<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Working Group — April</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F5F2EC;
    --surface: #FDFCF9;
    --border: #D9D4C7;
    --text: #1A1814;
    --muted: #7A7568;
    --accent: #2B4A3F;
    --accent-light: #D6E8E2;
    --danger: #7A2E2E;
    --danger-light: #F4E0E0;
    --yes-bg: #D6E8E2;
    --yes-text: #1A3D32;
    --no-bg: #F4E0E0;
    --no-text: #7A2E2E;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ---------- HEADER ---------- */
  header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.1;
  }
  header h1 span {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  /* ---------- MEMBER CHIPS ---------- */
  .chips-row {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .chip {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 13px; font-weight: 400;
    cursor: pointer; color: var(--text);
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .chip:hover { border-color: var(--text); }
  .chip.active { border-color: var(--text); background: var(--text); color: var(--surface); font-weight: 500; }
  .chip.active .chip-dot { box-shadow: 0 0 0 2px var(--surface); }
  .chip-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .btn {
    padding: 7px 16px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--bg); border-color: var(--text); }
  .btn-dark { background: var(--text); color: var(--surface); border-color: var(--text); }
  .btn-dark:hover { opacity: 0.85; background: var(--text); }

  /* ---------- MAIN LAYOUT ---------- */
  main { display: flex; min-height: calc(100vh - 90px); }

  /* ---------- SIDEBAR ---------- */
  aside {
    width: 220px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface);
    padding: 1.5rem 1.25rem;
  }
  aside h3 {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 1rem;
  }
  .member-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 8px;
    font-size: 13px; cursor: pointer; color: var(--text);
    transition: background 0.12s;
    position: relative;
  }
  .member-row:hover { background: var(--bg); }
  .member-row.me { background: var(--accent-light); font-weight: 500; }
  .member-row .badge {
    margin-left: auto; font-size: 10px; background: var(--accent-light);
    color: var(--accent); padding: 2px 6px; border-radius: 999px; font-weight: 500;
  }
  .member-row.me .badge { display: none; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
  .add-btn {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--muted);
    cursor: pointer; padding: 8px 10px; border-radius: 8px;
    transition: background 0.12s, color 0.12s;
    background: none; border: none; font-family: inherit; width: 100%; text-align: left;
  }
  .add-btn:hover { background: var(--bg); color: var(--text); }

  /* ---------- CALENDAR ---------- */
  .cal-wrap { flex: 1; padding: 1.5rem 2rem; }
  .dow-row {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
    margin-bottom: 6px;
  }
  .dow { text-align: center; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 4px 0; }
  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .day-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px;
    min-height: 90px;
    display: flex; flex-direction: column;
    transition: border-color 0.15s;
  }
  .day-cell:hover { border-color: #B0A898; }
  .day-cell.empty { background: transparent; border-color: transparent; pointer-events: none; }
  .day-cell.today { border-color: var(--accent); }
  .day-num-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .day-num {
    font-size: 13px; font-weight: 500; color: var(--muted);
    width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%;
  }
  .today .day-num { background: var(--accent); color: white; font-weight: 600; }
  .vote-btns { display: flex; gap: 3px; margin-bottom: 6px; }
  .vbtn {
    flex: 1; font-size: 11px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    padding: 4px 0; border-radius: 5px;
    border: 1px solid var(--border);
    cursor: pointer; transition: all 0.12s;
    background: var(--bg); color: var(--muted);
    text-align: center;
  }
  .vbtn:hover { border-color: var(--text); color: var(--text); }
  .vbtn.yes { background: var(--yes-bg); color: var(--yes-text); border-color: transparent; }
  .vbtn.no { background: var(--no-bg); color: var(--no-text); border-color: transparent; }
  .no-member .vbtn { opacity: 0.35; cursor: default; }
  .dots-row { display: flex; flex-wrap: wrap; gap: 3px; margin-top: auto; }
  .vdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .vdot.no-vote { background: transparent; box-shadow: inset 0 0 0 1.5px currentColor; }

  /* ---------- MODAL ---------- */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26,24,20,0.4); backdrop-filter: blur(2px);
    z-index: 100; align-items: center; justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 2rem;
    width: 100%; max-width: 360px; margin: 1rem;
  }
  .modal h2 { font-family: 'DM Serif Display', serif; font-weight: 400; font-size: 1.4rem; margin-bottom: 4px; }
  .modal p { font-size: 13px; color: var(--muted); margin-bottom: 1.25rem; }
  .modal input {
    width: 100%; padding: 9px 12px;
    border: 1px solid var(--border); border-radius: 7px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    background: var(--bg); color: var(--text);
    margin-bottom: 1rem; outline: none;
    transition: border-color 0.15s;
  }
  .modal input:focus { border-color: var(--accent); }
  .color-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .cpick {
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: border-color 0.12s, transform 0.12s;
  }
  .cpick:hover { transform: scale(1.1); }
  .cpick.sel { border-color: var(--text); }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns .btn { flex: 1; text-align: center; }
  .err { font-size: 12px; color: var(--danger); margin-bottom: 10px; min-height: 16px; }

  /* ---------- NO MEMBER NOTICE ---------- */
  .notice {
    font-size: 12px; color: var(--muted);
    background: var(--bg); border: 1px dashed var(--border);
    border-radius: 8px; padding: 10px 14px;
    margin: 0 2rem 0.5rem; text-align: center;
  }

  @media (max-width: 700px) {
    header { padding: 1.25rem 1rem 1rem; }
    aside { display: none; }
    .cal-wrap { padding: 1rem 0.75rem; }
    .day-cell { min-height: 72px; padding: 5px; }
    .vbtn { font-size: 10px; padding: 3px 0; }
  }
</style>
</head>
<body>

<header>
  <h1><span>Working group</span>April 2025</h1>
    <div style="font-family:'DM Serif Display',serif;font-size:clamp(1rem,2.5vw,1.35rem);font-weight:400;color:var(--muted);font-style:italic;margin-top:2px;">Eşşek gibi çalıştım mı?</div>
  <div class="header-right">
    <div class="chips-row" id="chips-row"></div>
    <button class="btn" onclick="openModal()">+ New member</button>
  </div>
</header>

<div id="no-member-notice" class="notice" style="display:none;margin-top:10px;">
  Select your name above to vote on days — or create a new profile.
</div>

<main>
  <aside>
    <h3>Members</h3>
    <div id="sidebar-members"></div>
    <hr class="sidebar-divider" />
    <button class="add-btn" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Add member
    </button>
  </aside>

  <div class="cal-wrap">
    <div class="dow-row">
      <div class="dow">Sun</div><div class="dow">Mon</div><div class="dow">Tue</div>
      <div class="dow">Wed</div><div class="dow">Thu</div><div class="dow">Fri</div><div class="dow">Sat</div>
    </div>
    <div class="days-grid" id="days-grid"></div>
  </div>
</main>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <h2>New member</h2>
    <p>Choose a name and a color.</p>
    <input type="text" id="name-input" placeholder="Your name" maxlength="24" />
    <div class="color-picker" id="color-picker"></div>
    <p class="err" id="modal-err"></p>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-dark" onclick="createMember()">Create</button>
    </div>
  </div>
</div>

<script>
const COLORS = ['#2B4A3F','#7F6D9A','#C0613A','#3A6C8A','#A3562A','#5A8A3A','#8A3A5A','#3A5A8A','#6B6B6B'];
let members = JSON.parse(localStorage.getItem('wg2_members') || '[]');
let votes   = JSON.parse(localStorage.getItem('wg2_votes')   || '{}');
let current = null;
let selColor = COLORS[0];

function save() {
  localStorage.setItem('wg2_members', JSON.stringify(members));
  localStorage.setItem('wg2_votes',   JSON.stringify(votes));
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
}

function lightColor(hex) {
  // returns a soft tint
  return hex + '22';
}

function renderAll() {
  renderChips();
  renderSidebar();
  renderCal();
  document.getElementById('no-member-notice').style.display = (!current && members.length) ? 'block' : 'none';
}

function renderChips() {
  const row = document.getElementById('chips-row');
  row.innerHTML = members.map(m =>
    `<div class="chip${current&&current.id===m.id?' active':''}" onclick="selectMember('${m.id}')">
      <div class="chip-dot" style="background:${m.color}"></div>
      ${m.name}
    </div>`
  ).join('');
}

function renderSidebar() {
  const el = document.getElementById('sidebar-members');
  if (!members.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:4px 10px;">No members yet.</div>';
    return;
  }
  el.innerHTML = members.map(m => {
    const isMe = current && current.id === m.id;
    return `<div class="member-row${isMe?' me':''}" onclick="selectMember('${m.id}')">
      <div class="avatar" style="background:${m.color}22;color:${m.color}">${initials(m.name)}</div>
      <span style="font-size:13px">${m.name}</span>
      ${isMe ? '' : '<span class="badge">Switch</span>'}
    </div>`;
  }).join('');
}

function selectMember(id) {
  current = members.find(m => m.id === id) || null;
  renderAll();
}

function vote(day, val) {
  if (!current) return;
  const key = `${current.id}_${day}`;
  votes[key] = votes[key] === val ? null : val;
  if (votes[key] === null) delete votes[key];
  save();
  renderCal();
}

function renderCal() {
  const grid = document.getElementById('days-grid');
  const firstDow = new Date(2025, 3, 1).getDay();
  const today = new Date();
  const isThisMonth = today.getFullYear()===2025 && today.getMonth()===3;
  let html = '';

  for (let i = 0; i < firstDow; i++) html += `<div class="day-cell empty"></div>`;

  for (let d = 1; d <= 30; d++) {
    const isToday = isThisMonth && today.getDate()===d;
    const myVote = current ? (votes[`${current.id}_${d}`] || null) : null;
    const noMemberClass = current ? '' : ' no-member';
    const dots = members.map(m => {
      const v = votes[`${m.id}_${d}`];
      if (!v) return '';
      if (v === 'yes') return `<div class="vdot" style="background:${m.color}" title="${m.name}: yes"></div>`;
      return `<div class="vdot no-vote" style="color:${m.color}" title="${m.name}: no"></div>`;
    }).join('');

    html += `<div class="day-cell${isToday?' today':''}${noMemberClass}">
      <div class="day-num-row">
        <div class="day-num">${d}</div>
      </div>
      <div class="vote-btns">
        <div class="vbtn${myVote==='yes'?' yes':''}" onclick="vote(${d},'yes')">Yes</div>
        <div class="vbtn${myVote==='no'?' no':''}" onclick="vote(${d},'no')">No</div>
      </div>
      <div class="dots-row">${dots}</div>
    </div>`;
  }
  grid.innerHTML = html;
}

/* ---- Modal ---- */
function openModal() {
  document.getElementById('name-input').value = '';
  document.getElementById('modal-err').textContent = '';
  selColor = COLORS[0];
  renderColorPicker();
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('name-input').focus(), 80);
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
}
document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') createMember(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('overlay').classList.remove('open'); });

function renderColorPicker() {
  document.getElementById('color-picker').innerHTML = COLORS.map(c =>
    `<div class="cpick${c===selColor?' sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}
function pickColor(c) { selColor = c; renderColorPicker(); }

function createMember() {
  const name = document.getElementById('name-input').value.trim();
  const err = document.getElementById('modal-err');
  if (!name) { err.textContent = 'Please enter a name.'; return; }
  if (members.find(m => m.name.toLowerCase() === name.toLowerCase())) { err.textContent = 'Name already taken.'; return; }
  const member = { id: Date.now().toString(), name, color: selColor };
  members.push(member);
  current = member;
  save();
  document.getElementById('overlay').classList.remove('open');
  renderAll();
}

renderAll();
</script>
</body>
</html>
